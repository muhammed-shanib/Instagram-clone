<!DOCTYPE html>
<html lang="en" class="bg-white">
<head>
  <meta charset="UTF-8" />
  <title>Edit Post - Instagram Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans text-gray-900 max-w-2xl mx-auto p-4">
  {% include 'sidebar.html' %}
  <main class="mt-6 border border-gray-300 rounded-md shadow-sm bg-white p-4">
    <h1 class="text-2xl font-bold mb-4">Edit Post</h1>
    <div class="mb-4">
      <img src="{{ post.postUrl }}" alt="Post Image" class="w-full object-contain max-h-[400px]" />
    </div>
    <form id="editPostForm" class="space-y-4">
      <label for="caption" class="block font-semibold">Caption</label>
      <textarea id="caption" name="caption" rows="4" class="w-full border border-gray-300 rounded px-3 py-2">{{ post.caption }}</textarea>
      <div class="flex space-x-4">
        <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">Save</button>
        <button type="button" id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    const postId = "{{ post_id }}";

    document.getElementById('editPostForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const caption = document.getElementById('caption').value.trim();
      if (!caption) {
        alert('Caption cannot be empty');
        return;
      }
      try {
        const response = await fetch('/editpost', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ post_id: postId, caption })
        });
        const data = await response.json();
        if (data.success) {
          alert('Post updated successfully');
          window.location.href = `/viewpost/${postId}`;
        } else {
          alert(data.error || 'Failed to update post');
        }
      } catch (error) {
        alert('Error updating post');
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = `/viewpost/${postId}`;
    });
  </script>
</body>
</html>

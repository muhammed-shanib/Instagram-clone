<!DOCTYPE html>
<html lang="en" class="bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - Instagram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <script type="module" src="/static/firebase-login.js" defer></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50">
  <div class="max-w-md w-full bg-white border border-gray-300 rounded-md p-8 space-y-6">
    <div class="flex justify-center mb-6">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/2560px-Instagram_logo.svg.png"
        alt="Instagram Logo"
        class="h-12 object-contain select-none"
      />
    </div>
    <form class="space-y-4" id="signup-form" onsubmit="return false;">
      <input
        type="text"
        id="name"
        placeholder="Full Name"
        class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
      <input
        type="text"
        id="username"
        placeholder="Username"
        class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
      <input
        type="email"
        id="email"
        placeholder="Email"
        class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
      <input
        type="password"
        id="password"
        placeholder="Password"
        class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
      <button
        id="signup"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded text-sm transition"
      >
        Sign Up
      </button>
    </form>
    <p class="text-center text-sm text-gray-600">
      Have an account?
      <a href="/login" class="text-blue-600 font-semibold hover:underline">Log in</a>
    </p>
    <p id="user-info" class="text-center text-red-600 text-sm mt-2"></p>
  </div>
</body>
</html>

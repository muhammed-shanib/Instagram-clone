<!DOCTYPE html>
<html lang="en" class="bg-white">
<head>
  <meta charset="UTF-8" />
  <title>Edit Profile - Instagram Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Modal backdrop */
    #changePhotoModal {
      display: none;
      position: fixed;
      z-index: 50;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    /* Modal card */
    #changePhotoModal .modal-content {
      background: white;
      border-radius: 0.5rem;
      padding: 1rem;
      width: 280px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    }
    #changePhotoModal button {
      width: 100%;
      padding: 0.5rem 0;
      border: none;
      background: none;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 0.375rem;
      transition: background-color 0.2s;
    }
    #changePhotoModal button:hover {
      background-color: #f3f4f6; /* Tailwind gray-100 */
    }
  </style>
</head>
<body class="bg-white font-sans text-gray-900">
  {% include 'sidebar.html' %}
  <div class="ml-60 max-w-3xl mt-6 px-4">
    <main>
      <h2 class="text-2xl font-semibold mb-6">Edit Profile</h2>
      <form id="editProfileForm" class="space-y-6" method="post" action="/editprofile" enctype="multipart/form-data">
        <div class="flex items-center space-x-6">
          <img id="profileImage" src="{{ profile_pic_url }}" alt="Profile Picture" class="profile-pic" style="width:4cm; height:4cm; object-fit: cover; border-radius: 9999px;" />
          <div>
            <!-- Hidden file input -->
            <input type="file" name="profile_image" id="profilePicInput" accept="image/*" class="hidden" />
            <!-- Change Photo button -->
            <button type="button" id="changePhotoBtn" class="text-blue-600 hover:underline text-sm mt-2">Change Photo</button>
            <!-- Hidden input to mark removal of profile picture -->
            <input type="hidden" name="remove_profile_image" id="removeProfileImageFlag" value="false" />
          </div>
        </div>

        <div>
          <label for="username" class="block font-semibold mb-1">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            value="{{ username }}"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label for="fullName" class="block font-semibold mb-1">Full Name</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            value="{{ full_name }}"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label for="bio" class="block font-semibold mb-1">Bio</label>
          <textarea
            id="bio"
            name="bio"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >{{ bio }}</textarea>
        </div>

        <div class="flex space-x-4">
          <button
            type="submit"
            id="saveProfileBtn"
            class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded"
            disabled
          >
            Save
          </button>
        </div>
      </form>
    </main>
  </div>

  <!-- Change Photo Modal -->
  <div id="changePhotoModal" class="flex">
    <div class="modal-content">
      <button type="button" id="uploadPhotoOption">Upload Photo</button>
      <button type="button" id="removePhotoOption" class="text-red-600">Remove Current Photo</button>
      <button type="button" id="cancelModalOption">Cancel</button>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('editProfileForm');
      const saveBtn = document.getElementById('saveProfileBtn');
      const usernameInput = document.getElementById('username');
      const fullNameInput = document.getElementById('fullName');
      const bioInput = document.getElementById('bio');
      const profileImage = document.getElementById('profileImage');
      const profilePicInput = document.getElementById('profilePicInput');
      const removeProfileImageFlag = document.getElementById('removeProfileImageFlag');
      const changePhotoBtn = document.getElementById('changePhotoBtn');
      const changePhotoModal = document.getElementById('changePhotoModal');
      const uploadPhotoOption = document.getElementById('uploadPhotoOption');
      const removePhotoOption = document.getElementById('removePhotoOption');
      const cancelModalOption = document.getElementById('cancelModalOption');

      // Store initial values to detect changes
      const initialUsername = usernameInput.value;
      const initialFullName = fullNameInput.value;
      const initialBio = bioInput.value;
      const initialProfileImageSrc = profileImage.src;

      let profileImageChanged = false;
      let profileImageRemoved = false;

      // Enable or disable save button based on changes
      function checkChanges() {
        const usernameChanged = usernameInput.value !== initialUsername;
        const fullNameChanged = fullNameInput.value !== initialFullName;
        const bioChanged = bioInput.value !== initialBio;
        const imageChanged = profileImageChanged || profileImageRemoved;

        if (usernameChanged || fullNameChanged || bioChanged || imageChanged) {
          saveBtn.disabled = false;
        } else {
          saveBtn.disabled = true;
        }
      }

      // Input event listeners
      usernameInput.addEventListener('input', checkChanges);
      fullNameInput.addEventListener('input', checkChanges);
      bioInput.addEventListener('input', checkChanges);

      // Change Photo button click opens modal
      changePhotoBtn.addEventListener('click', () => {
        changePhotoModal.style.display = 'flex';
      });

      // Cancel modal option closes modal
      cancelModalOption.addEventListener('click', () => {
        changePhotoModal.style.display = 'none';
      });

      // Upload Photo option triggers hidden file input click
      uploadPhotoOption.addEventListener('click', () => {
        changePhotoModal.style.display = 'none';
        profilePicInput.click();
      });

      // When file input changes, update profile image preview and flags
      profilePicInput.addEventListener('change', () => {
        if (profilePicInput.files && profilePicInput.files[0]) {
          const reader = new FileReader();
          reader.onload = function(e) {
            profileImage.src = e.target.result;
            profileImageChanged = true;
            profileImageRemoved = false;
            removeProfileImageFlag.value = 'false';
            checkChanges();
          };
          reader.readAsDataURL(profilePicInput.files[0]);
        }
      });

      // Remove Current Photo option
      removePhotoOption.addEventListener('click', () => {
        changePhotoModal.style.display = 'none';
        profileImage.src = '/static/images/placeholder.png'; // Use placeholder image
        profileImageRemoved = true;
        profileImageChanged = false;
        removeProfileImageFlag.value = 'true';
        profilePicInput.value = ''; // Clear file input
        checkChanges();
      });

      // On form submit, changes apply
      form.addEventListener('submit', () => {
        // Save button is enabled only if changes exist, so no extra check needed here
      });
    })();
  </script>
</body>
</html>
